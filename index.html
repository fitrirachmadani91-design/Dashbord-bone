  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>🚀 Dashboard Teknisi WiFi</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* RESPONSIVE HP + LAPTOP */

@media screen and (max-width:768px){

body{
padding:10px;
}

.container{
width:100%;
padding:0;
}

.glass-card{
padding:15px;
border-radius:20px;
}

.top-action{
display:flex;
flex-direction:column;
width:100%;
}

.export-btn,
.logout-btn,
.add-btn{
width:100%;
}

.form-container{
flex-direction:column;
}

input,
select{
width:100%;
min-width:unset;
}

.header h1{
font-size:26px;
}

.header p{
font-size:14px;
}

.table-header{
flex-direction:column;
gap:10px;
text-align:center;
}

table{
width:100%;
table-layout:fixed;
}

th,
td{
font-size:12px;
padding:8px;
word-break:break-word;
}

td:last-child{
display:flex;
flex-direction:column;
gap:8px;
}

td button{
width:100%;
margin:0 !important;
}
}
    :root {
      --glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.12);
      --cyan: #00d4ff;
      --green: #00ff88;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(
        135deg,
        #0f0f23 0%,
        #1a0033 30%,
        #2d1b69 60%,
        #0f0f23 100%
      );
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    #auth-loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0033 50%, #0f0f23 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 9999;
      color: white;
      font-size: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0,212,255,0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #main-content {
      display: none;
    }

  .container{
   width:100%;
   max-width:900px;
   margin:auto;
   padding:15px;
   box-sizing:border-box;
}

    .glass-card {
      backdrop-filter: blur(30px);
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 25px;
    }

    .top-action {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .logout-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #ef4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .export-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.8;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      margin-top: 15px;
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.3);
      font-size: 14px;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .form-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input, select {
      padding: 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      flex: 1;
      min-width: 220px;
      font-size: 15px;
    }

    .add-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: var(--cyan);
      color: white;
      font-weight: bold;
      cursor: pointer;
      min-width: 140px;
    }

    .table-card {
      background: rgba(10,14,39,0.9);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .table-header {
      padding: 18px;
      background: rgba(30,64,175,0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    .badge-total {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,255,136,0.5);
      color: var(--green);
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 16px;
      text-align: left;
    }

    thead {
      background: rgba(255,255,255,0.05);
    }

    tbody tr:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    tbody tr:hover {
      background: rgba(0,212,255,0.08);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      text-transform: capitalize;
    }

    .pemasangan { background: #22c55e; color: white; }
    .perbaikan  { background: #ef4444; color: white; }
    .pending    { background: #facc15; color: black; }
    .proses     { background: #facc15; color: black; }
    .selesai    { background: #166534; color: white; }

    .loading-container {
      padding: 50px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="auth-loading">
    <div class="spinner"></div>
    <span>Memeriksa sesi login...</span>
  </div>

  <div id="main-content">
    <div class="container">
      <div class="glass-card">

        <div class="top-action">
          <button class="export-btn" onclick="exportToSheet()">Export</button>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="header">
          <h1>🚀 Dashboard Teknisi</h1>
          <p>Monitoring tugas realtime teknisi WiFi</p>
          <div class="status-badge">
            <span class="status-dot"></span>
            <span>LIVE REALTIME FIRESTORE</span>
          </div>
        </div>

        <div class="form-container">
          <input type="text" id="alamat" placeholder="Masukkan alamat">
          <input type="text" id="namaHp" placeholder="Nama / No HP">
          <select id="jenis">
            <option value="pemasangan">Pemasangan</option>
            <option value="perbaikan">Perbaikan</option>
          </select>
          <button class="add-btn" onclick="tambahTugas()">TAMBAH</button>
        </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
          <input type="text" id="searchInput" placeholder="Cari alamat / nama...">
          <select id="filterStatus">
            <option value="all">Semua Status</option>
            <option value="pending">Pending</option>
            <option value="proses">Proses</option>
            <option value="selesai">Selesai</option>
          </select>
        </div>

        <div id="table-wrapper">
          <div class="loading-container">Memuat data realtime...</div>
        </div>

      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged,
      signOut
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      doc,
      updateDoc,
      deleteDoc,
      getDocs
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfz4Ep5E1xwaGFZkHcce0RosO8CsoqVz0",
      authDomain: "wifi-dashboard-d91e6.firebaseapp.com",
      projectId: "wifi-dashboard-d91e6",
      storageBucket: "wifi-dashboard-d91e6.appspot.com",
      messagingSenderId: "178130294563",
      appId: "1:178130294563:web:af5a5f5d5bb974386b1e96"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const SHEET_URL = "https://script.google.com/macros/s/AKfycbzrm0_MxNdS4LqqhLH43FCPTGlB1EiMVQEUlMRrZ2bs_ZswDTcl_PRO3a20Ekar9QK-/exec";

    let userRole = "";
    let authResolved = false;
    let allData = [];

    const authTimeout = setTimeout(() => {
      if (!authResolved) {
        authResolved = true;
        window.location.href = "login.html";
      }
    }, 6000);

    onAuthStateChanged(auth, async (user) => {
      if (authResolved) return;
      authResolved = true;
      clearTimeout(authTimeout);

      if (!user) {
        sessionStorage.removeItem("sudahLogin");
        window.location.href = "login.html";
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, "user"));

        snapshot.forEach((d) => {
          const data = d.data();
          if (data.email === user.email) {
            userRole = data.role;
          }
        });

        if (userRole === "teknisi") {
          document.querySelector(".form-container").style.display = "none";
          document.querySelector(".header h1").innerHTML = "🛠 Dashboard Teknisi";
          document.querySelector(".export-btn").style.display = "none";
        }

        document.getElementById("auth-loading").style.display = "none";
        document.getElementById("main-content").style.display = "block";

        startFirestoreListener();
        bindSearchFilter();

      } catch(error) {
        console.log(error);
        alert("Gagal membaca role user");
      }
    });

    window.logout = async function() {
      await signOut(auth);
      sessionStorage.removeItem("sudahLogin");
      window.location.href = "login.html";
    };

    window.tambahTugas = async function() {
      if(userRole !== "admin"){
        alert("Hanya admin yang dapat menambahkan tugas");
        return;
      }

      const alamat = document.getElementById("alamat").value.trim();
      const namaHp = document.getElementById("namaHp").value.trim();
      const jenis  = document.getElementById("jenis").value;

      if (!alamat || !namaHp) {
        alert("Lengkapi data");
        return;
      }

      try {
        await addDoc(collection(db, "tugas"), {
          alamat,
          namaHp,
          jenis,
          status: "pending",
          foto: "",
          createdAt: new Date()
        });

        document.getElementById("alamat").value = "";
        document.getElementById("namaHp").value = "";
        document.getElementById("jenis").value = "pemasangan";

        alert("Tugas berhasil ditambahkan");
      } catch(error) {
        console.log(error);
        alert("Gagal tambah tugas");
      }
    };

    window.updateStatus = async function(id, status) {
      try {
        await updateDoc(doc(db, "tugas", id), { status });
      } catch(error) {
        console.log(error);
        alert("Gagal update status");
      }
    };

    window.hapusTugas = async function(id) {
      const yakin = confirm("Yakin ingin menghapus tugas?");
      if (!yakin) return;

      try {
        await deleteDoc(doc(db, "tugas", id));
        alert("Tugas berhasil dihapus");
      } catch(error) {
        console.log(error);
        alert("Gagal hapus");
      }
    };

    window.exportToSheet = async function() {
      if (userRole !== "admin") {
        alert("Hanya admin yang dapat export data");
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, "tugas"));
        const rows = [];

        snapshot.forEach((d) => {
          const item = d.data();
          rows.push({
            id: d.id,
            alamat: item.alamat || "",
            namaHp: item.namaHp || "",
            jenis: item.jenis || "",
            status: item.status || "",
            createdAt: item.createdAt && item.createdAt.toDate
              ? item.createdAt.toDate().toLocaleString("id-ID")
              : ""
          });
        });

        if (!rows.length) {
          alert("Tidak ada data untuk diexport");
          return;
        }

        const res = await fetch(SHEET_URL, {
          method: "POST",
          redirect: "follow",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "exportTugas",
            data: rows
          })
        });

        if (!res.ok) {
          throw new Error("Gagal export ke Google Sheet");
        }

        alert("Export ke Google Sheet berhasil");
      } catch (error) {
        console.log(error);
        alert("Export gagal");
      }
    };

    function renderTable(data) {
      const wrapper = document.getElementById("table-wrapper");
      const keyword = document.getElementById("searchInput")?.value.toLowerCase() || "";
      const filterStatus = document.getElementById("filterStatus")?.value || "all";

      let filtered = data.filter((item) => {
        const cocokKeyword =
          (item.alamat || "").toLowerCase().includes(keyword) ||
          (item.namaHp || "").toLowerCase().includes(keyword);

        const cocokStatus =
          filterStatus === "all" || item.status === filterStatus;

        return cocokKeyword && cocokStatus;
      });

      if (!filtered.length) {
        wrapper.innerHTML = `
          <div class="loading-container">Tidak ada data</div>
        `;
        return;
      }

      let rows = "";

      filtered.forEach((item) => {
        rows += `
          <tr>
            <td>${item.alamat || "-"}</td>
            <td>${item.namaHp || "-"}</td>
            <td>
              <span class="badge ${item.jenis || ""}">${item.jenis || "-"}</span>
            </td>
            <td>
              <span class="badge ${item.status || ""}">${item.status || "-"}</span>
            </td>
            <td style="white-space:nowrap;">
              ${item.status !== "selesai" ? `
                <button
                  onclick="updateStatus('${item.id}','proses')"
                  style="
                    background:#facc15;
                    color:black;
                    border:none;
                    padding:8px 14px;
                    border-radius:999px;
                    cursor:pointer;
                    margin-right:6px;
                    font-weight:bold;
                  "
                >Proses</button>

                <button
                  onclick="updateStatus('${item.id}','selesai')"
                  style="
                    background:#166534;
                    color:white;
                    border:none;
                    padding:8px 14px;
                    border-radius:999px;
                    cursor:pointer;
                    margin-top:8px;
                    font-weight:bold;
                  "
                >Selesai</button>
              ` : ""}

              ${item.status === "selesai" && userRole === "admin" ? `
                <br><br>
                <button
                  onclick="hapusTugas('${item.id}')"
                  style="
                    background:#ef4444;
                    color:white;
                    border:none;
                    padding:8px 14px;
                    border-radius:999px;
                    cursor:pointer;
                    font-weight:bold;
                  "
                >
                  Hapus
                </button>
              ` : ""}
            </td>
          </tr>
        `;
      });

      wrapper.innerHTML = `
        <div class="table-card">
          <div class="table-header">
            <span>Data Tugas Teknisi</span>
            <span class="badge-total">${filtered.length} Data</span>
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>Alamat</th>
                  <th>Nama / HP</th>
                  <th>Jenis</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function startFirestoreListener() {
    const q = query(
      collection(db, "tugas"),
      orderBy("alamat", "asc")
    );

    onSnapshot(q, (snapshot) => {
      allData = [];
      snapshot.forEach((d) => {
        allData.push({ id: d.id, ...d.data() });
      });
      renderTable(allData);
    }, (error) => {
      console.log(error);
      document.getElementById("table-wrapper").innerHTML =
        `<div class="loading-container">Gagal memuat data</div>`;
    });
}

    function bindSearchFilter() {
      document.getElementById("searchInput")
        .addEventListener("input", () => renderTable(allData));

      document.getElementById("filterStatus")
        .addEventListener("change", () => renderTable(allData));
    }
  </script>
</body>
</html>
